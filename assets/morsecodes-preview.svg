<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Morse Code app preview</title>
  <desc id="desc">A dark Morse Code preview card with dots, dashes, and a compact app interface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06100f"/>
      <stop offset="0.48" stop-color="#10251f"/>
      <stop offset="1" stop-color="#173c32"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1ff0a0"/>
      <stop offset="1" stop-color="#75f7d2"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.22" r="0.65">
      <stop offset="0" stop-color="#26f6b2" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#26f6b2" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#26f6b2" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="42" fill="url(#bg)"/>
  <rect width="1200" height="630" rx="42" fill="url(#glow)"/>

  <g opacity="0.16" fill="none" stroke="#8fffe0" stroke-width="2">
    <path d="M92 88h86m28 0h24m32 0h142m424 0h168m34 0h58"/>
    <path d="M86 538h134m32 0h42m32 0h178m392 0h70m34 0h112"/>
    <path d="M1032 154h42m24 0h20m24 0h58"/>
    <path d="M72 206h52m26 0h108m30 0h28"/>
  </g>

  <g transform="translate(78 78)">
    <rect x="0" y="0" width="160" height="44" rx="22" fill="#12362e" stroke="#2ef2b3" stroke-opacity="0.45"/>
    <circle cx="28" cy="22" r="7" fill="#2ef2b3"/>
    <rect x="48" y="18" width="74" height="8" rx="4" fill="#2ef2b3"/>
    <circle cx="138" cy="22" r="7" fill="#2ef2b3" opacity="0.65"/>
  </g>

  <g transform="translate(86 168)">
    <text x="0" y="0" fill="#dffcf3" font-family="Verdana, Geneva, sans-serif" font-size="72" font-weight="800">Morse Code</text>
    <text x="0" y="58" fill="#88dbc5" font-family="Verdana, Geneva, sans-serif" font-size="28" font-weight="700">7 Alphabets</text>
    <text x="0" y="112" fill="#c7f4e6" font-family="Verdana, Geneva, sans-serif" font-size="28">Encode, decode, learn, and send signals offline.</text>
  </g>

  <g transform="translate(90 364)" fill="#071511" filter="url(#shadow)">
    <rect width="445" height="108" rx="30" fill="#e7fff6"/>
    <text x="34" y="43" fill="#0d2b24" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="800">TEXT TO MORSE</text>
    <text x="34" y="78" fill="#156c58" font-family="Verdana, Geneva, sans-serif" font-size="28" font-weight="700">HELLO  →  .... . .-.. .-.. ---</text>
  </g>

  <g transform="translate(580 86)" filter="url(#shadow)">
    <rect width="456" height="456" rx="46" fill="#0a1714" stroke="#2ef2b3" stroke-opacity="0.18"/>
    <rect x="38" y="42" width="380" height="372" rx="34" fill="#10241f"/>
    <rect x="70" y="78" width="154" height="18" rx="9" fill="#2ef2b3"/>
    <rect x="70" y="116" width="312" height="12" rx="6" fill="#92f9dd" opacity="0.42"/>
    <rect x="70" y="142" width="234" height="12" rx="6" fill="#92f9dd" opacity="0.28"/>

    <g transform="translate(70 204)">
      <circle cx="16" cy="16" r="16" fill="url(#panel)"/>
      <rect x="55" y="4" width="168" height="24" rx="12" fill="#2ef2b3"/>
      <circle cx="268" cy="16" r="16" fill="url(#panel)"/>
      <rect x="306" y="4" width="48" height="24" rx="12" fill="#2ef2b3" opacity="0.72"/>
    </g>

    <g transform="translate(70 278)" fill="none" stroke="#caffef" stroke-width="8" stroke-linecap="round">
      <path d="M0 0h38"/>
      <path d="M70 0h8"/>
      <path d="M112 0h72"/>
      <path d="M218 0h8"/>
      <path d="M260 0h92"/>
      <path d="M0 48h8"/>
      <path d="M44 48h98"/>
      <path d="M178 48h8"/>
      <path d="M224 48h128"/>
    </g>
  </g>

  <g transform="translate(86 544)">
    <text fill="#9debd6" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700">EN · RU · AR · JA · EL · HE · KO</text>
  </g>
</svg>
